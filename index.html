<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestie Story 💞</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  overflow:hidden;
  color:white;
}

#story{
  position:fixed;
  width:100%;
  height:100%;
}

#bars{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  gap:5px;
  z-index:10;
}

.bar{
  flex:1;
  height:3px;
  background:rgba(255,255,255,0.3);
}

.fill{
  height:100%;
  width:0%;
  background:white;
  transition:3s linear;
}

#text{
  position:absolute;
  bottom:20%;
  width:100%;
  text-align:center;
  font-size:22px;
  padding:20px;
}

.heart{
  position:fixed;
  font-size:22px;
  animation:float 3s linear forwards;
}

@keyframes float{
  to{
    transform:translateY(-100vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- Hidden YouTube Player -->
<div id="ytplayer" style="position:fixed;width:0;height:0;opacity:0;pointer-events:none;"></div>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

const VIDEO_ID = "oafxkMv4xnc"; // ✅ Your song

function onYouTubeIframeAPIReady(){
  player = new YT.Player('ytplayer',{
    height:'0',
    width:'0',
    videoId: VIDEO_ID,
    playerVars:{
      autoplay:1,
      loop:1,
      playlist: VIDEO_ID
    },
    events:{
      onReady:(e)=> e.target.setVolume(50)
    }
  });
}
</script>

<div id="story">
  <div id="bars"></div>
  <div id="text"></div>
</div>

<script>
const slides = [
"Hey Purvi 🫶",
"Mujhse thodi si gadbad ho gayi 😅",
"Par jaan ke nahi ki yaar 🥺",
"Tu important hai… like real wali 💞",
"Tere bina sab boring lag raha hai 😔",
"Gussa ho toh thoda kam kar na 😏",
"Game khelegi ya attitude hi dikhayegi 😂",
"Dekha… tu hi jeeti 💞",
"Ye memories… best hain tere saath 📸",
"Main irritating hoon… but itna bhi nahi 😭😂",
"Tu meri life ki VIP hai 🫶",
"Ab maan ja bestie 🥺💞"
];

let current = 0;
let started = false;

// Progress bars
slides.forEach(()=>{
  let b=document.createElement('div');
  b.className='bar';
  let f=document.createElement('div');
  f.className='fill';
  b.appendChild(f);
  bars.appendChild(b);
});

function showSlide(i){
  current = i;
  text.innerText = slides[i];

  let fills=document.querySelectorAll('.fill');
  fills.forEach(f=>f.style.width="0%");
  setTimeout(()=>fills[i].style.width="100%",50);

  if(navigator.vibrate) navigator.vibrate(80);
}

function next(){
  if(current < slides.length-1){
    showSlide(current+1);
  } else {
    finalScreen();
  }
}

function prev(){
  if(current>0){
    showSlide(current-1);
  }
}

// Tap + music start
document.body.addEventListener("click",(e)=>{
  if(!started){
    if(player){ player.playVideo(); }
    started = true;
  }

  if(e.clientX < window.innerWidth/2){
    prev();
  } else {
    next();
  }
});

function explodeHearts(){
  for(let i=0;i<70;i++){
    let h=document.createElement('div');
    h.className='heart';
    h.innerText="💞";
    h.style.left=Math.random()*100+'vw';
    h.style.top='100vh';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),3000);
  }
}

function finalScreen(){
  document.body.innerHTML="";

  let msg=document.createElement("h1");
  msg.innerText="Sorry Bestie 🫶💞";
  msg.style.position="absolute";
  msg.style.top="40%";
  msg.style.left="50%";
  msg.style.transform="translate(-50%,-50%)";
  document.body.appendChild(msg);

  explodeHearts();

  setTimeout(()=>{
    alert("Ab gussa khatam? 😏💞");
  },2000);
}

showSlide(0);
</script>

</body>
</html>
