
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestie Story 💞</title>

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:Arial;
  overflow:hidden;
}

/* Animated Background */
body{
  color:white;
  background: linear-gradient(-45deg, #ff4d6d, #6a5cff, #00c2ff, #00ff9d, #ffcc00);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
  background-attachment: fixed;
}

@keyframes gradientBG{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Story container */
#story{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:2;
}

/* Progress bars */
#bars{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  gap:5px;
}

.bar{
  flex:1;
  height:4px;
  background:rgba(255,255,255,0.25);
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:white;
  transition:0.3s;
}

/* Text */
#text{
  position:absolute;
  bottom:20%;
  width:100%;
  text-align:center;
  font-size:22px;
  padding:20px;
  opacity:1;
  transition:0.4s;
  text-shadow:0 0 10px rgba(0,0,0,0.6);
}

/* Hearts animation */
.heart{
  position:fixed;
  font-size:22px;
  animation:float 3s linear forwards;
}

@keyframes float{
  to{
    transform:translateY(-100vh);
    opacity:0;
  }
}

/* Hidden YouTube player */
#ytplayer{
  position:fixed;
  width:0;
  height:0;
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="ytplayer"></div>

<div id="story">
  <div id="bars"></div>
  <div id="text"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
const VIDEO_ID = "oafxkMv4xnc";

function onYouTubeIframeAPIReady(){
  player = new YT.Player('ytplayer',{
    videoId: VIDEO_ID,
    playerVars:{
      autoplay:0,
      loop:1,
      playlist: VIDEO_ID
    },
    events:{
      onReady:(e)=> e.target.setVolume(50)
    }
  });
}

let musicStarted = false;
document.body.addEventListener("click", ()=>{
  if(!musicStarted && player){
    player.playVideo();
    musicStarted = true;
  }
});

/* Slides */
const slides = [
"Hey Purvi 🫶",
"Mujhse thodi si gadbad ho gayi 😅",
"Par jaan ke nahi ki yaar 🥺",
"Tu important hai… like real wali 💞",
"Tere bina sab boring lag raha hai 😔",
"Gussa ho toh thoda kam kar na 😏",
"Game khelegi ya attitude hi dikhayegi 😂",
"Dekha… tu hi jeeti 💞",
"Ye memories… best hain tere saath 📸",
"Main irritating hoon… but itna bhi nahi 😭😂",
"Tu meri life ki VIP hai 🫶",
"Ab maan ja bestie 🥺💞"
];

let current = 0;

/* Create bars */
const bars = document.getElementById("bars");
slides.forEach(()=>{
  let b=document.createElement('div');
  b.className='bar';
  let f=document.createElement('div');
  f.className='fill';
  b.appendChild(f);
  bars.appendChild(b);
});

/* Show slide */
function showSlide(i){
  const text = document.getElementById("text");

  text.style.opacity = 0;

  setTimeout(()=>{
    current = i;
    text.innerText = slides[i];
    text.style.opacity = 1;

    let fills=document.querySelectorAll('.fill');
    fills.forEach((f, idx)=>{
      f.style.width = (idx < i) ? "100%" : "0%";
    });

    setTimeout(()=>{
      if(fills[i]) fills[i].style.width = "100%";
    },50);

    if(navigator.vibrate) navigator.vibrate(80);
  },200);
}

/* Navigation */
function next(){
  if(current < slides.length-1){
    showSlide(current+1);
  } else {
    finalScreen();
  }
}

function prev(){
  if(current > 0){
    showSlide(current-1);
  }
}

/* Tap controls */
document.body.addEventListener("click",(e)=>{
  if(e.clientX < window.innerWidth/2){
    prev();
  } else {
    next();
  }
});

/* Hearts effect */
function explodeHearts(){
  for(let i=0;i<80;i++){
    let h=document.createElement('div');
    h.className='heart';
    h.innerText="💞";
    h.style.left=Math.random()*100+'vw';
    h.style.top='100vh';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),3000);
  }
}

/* Final screen */
function finalScreen(){
  document.body.innerHTML="";

  let msg=document.createElement("h1");
  msg.innerText="Sorry Bestie 🫶💞";
  msg.style.position="absolute";
  msg.style.top="40%";
  msg.style.left="50%";
  msg.style.transform="translate(-50%,-50%)";
  msg.style.textAlign="center";

  document.body.appendChild(msg);

  explodeHearts();

  setTimeout(()=>{
    alert("Ab gussa khatam? 😏💞");
  },2000);
}

/* Init */
showSlide(0);
</script>

</body>
</html>
